<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 视频通话</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f; color: #e0e0e0; height: 100vh; overflow: hidden;
        }
        .container { display: flex; height: 100vh; }
        .main { flex: 1; display: flex; flex-direction: column; padding: 16px; min-width: 0; }
        .sidebar {
            width: 360px; background: #1a1a1a; border-left: 1px solid #2a2a2a;
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .video-container {
            flex: 1; background: #000; border-radius: 12px; position: relative;
            overflow: hidden; min-height: 400px;
        }
        .video-container video {
            width: 100%; height: 100%; object-fit: cover;
        }
        .video-overlay {
            position: absolute; bottom: 16px; left: 16px; right: 16px;
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .video-overlay .badge {
            background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 6px; font-size: 12px;
        }
        .badge.active { color: #4caf50; }
        .controls {
            display: flex; gap: 8px; padding: 12px 0; flex-wrap: wrap;
        }
        .controls button {
            padding: 8px 16px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .controls button:hover { opacity: 0.85; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-danger { background: #d32f2f; color: white; }
        .btn-success { background: #2e7d32; color: white; }
        .btn-secondary { background: #424242; color: white; }
        .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
        .log-container {
            flex: 1; overflow-y: auto; padding: 12px;
            background: #121212; border-radius: 8px; min-height: 200px;
        }
        .log-entry { margin-bottom: 8px; font-size: 13px; line-height: 1.5; }
        .log-entry.user { color: #81c784; }
        .log-entry.ai { color: #64b5f6; }
        .log-entry.system { color: #bdbdbd; font-style: italic; font-size: 12px; }
        .log-entry.error { color: #e57373; }
        .log-time { color: #616161; margin-right: 8px; font-size: 11px; }
        .sidebar-header {
            padding: 12px 16px; border-bottom: 1px solid #2a2a2a;
            font-size: 14px; font-weight: 600;
        }
        .connection-bar {
            padding: 8px 16px; display: flex; gap: 12px; align-items: center;
            border-bottom: 1px solid #2a2a2a; font-size: 12px;
        }
        #statusText { padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .status-connected { background: #1b5e20; color: #81c784; }
        .status-disconnected { background: #b71c1c; color: #ef9a9a; }
        .status-error { background: #e65100; color: #ffcc80; }
    </style>
</head>
<body>
<div class="container">
    <div class="main">
        <div class="video-container">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="video-overlay">
                <span class="badge" id="statusBadge">📷 摄像头: 未开启</span>
                <span class="badge" id="micBadge">🎤 麦克风: 未开启</span>
                <span class="badge" id="fpsBadge">📸 帧率: 0 fps</span>
            </div>
            <div class="controls">
                <button id="btnConnect" class="btn-primary" onclick="connect()">连接 WebSocket</button>
                <button id="btnDisconnect" class="btn-danger" onclick="disconnect()" disabled>断开连接</button>
                <button id="btnCamera" class="btn-secondary" onclick="toggleCamera()" disabled>打开摄像头</button>
                <button id="btnMic" class="btn-secondary" onclick="toggleMic()" disabled>打开麦克风</button>
            </div>
        </div>
    </div>
    <div class="sidebar">
        <div class="sidebar-header">📋 对话日志</div>
        <div class="connection-bar">
            <span id="wsBadge">🔗 WebSocket: 未连接</span>
            <span id="statusText" class="status-disconnected">未连接</span>
        </div>
        <div class="log-container" id="logContainer"></div>
    </div>
</div>

<script>
    let ws = null;
    let sessionId = null;
    let localStream = null;
    let frameInterval = null;
    let frameCount = 0;
    let lastFpsTime = Date.now();
    let cameraActive = false;
    let audioContext = null;
    let scriptProcessor = null;
    let micStream = null;
    let micActive = false;

    // ===== 会话管理 =====
    async function connect() {
        try {
            const response = await fetch('/api/session/create', { method: 'POST' });
            const data = await response.json();
            sessionId = data.sessionId;
            addLog('system', `创建会话: ${sessionId}`);

            ws = new WebSocket(`ws://${location.host}/ws?sessionId=${sessionId}`);

            ws.onopen = () => {
                updateStatus('connected', '已连接');
                wsBadge.textContent = '🔗 WebSocket: 已连接';
                btnConnect.disabled = false;
                btnDisconnect.disabled = false;
                btnCamera.disabled = false;
                btnMic.disabled = false;
                addLog('system', 'WebSocket 已连接');
            };

            ws.onmessage = (event) => {
                if (event.data instanceof Blob) {
                    handleAudioData(event.data);
                    return;
                }
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch (e) {
                    console.warn('非JSON消息:', event.data);
                }
            };

            ws.onclose = () => {
                updateStatus('disconnected', '未连接');
                wsBadge.textContent = '🔗 WebSocket: 未连接';
                btnConnect.disabled = false;
                btnConnect.textContent = '连接 WebSocket';
                btnDisconnect.disabled = true;
                btnCamera.disabled = true;
                btnMic.disabled = true;
                if (sessionId) addLog('system', `连接已关闭 (Session: ${sessionId})`);
                ws = null;
            };

            ws.onerror = (err) => {
                addLog('error', 'WebSocket 连接错误');
                updateStatus('error', '连接错误');
            };

        } catch (err) {
            addLog('error', `创建会话失败: ${err.message}`);
            btnConnect.disabled = false;
        }
    }

    function disconnect() {
        if (ws) { ws.close(); ws = null; }
        stopCamera();
        stopMic();
    }

    function handleMessage(msg) {
        switch (msg.type) {
            case 'connected':
                addLog('system', 'WebSocket 连接确认');
                setTimeout(() => { toggleCamera(); }, 500);
                setTimeout(() => { toggleMic(); }, 1000);
                break;
            case 'asr_result':
                addLog('user', msg.text);
                addLog('system', `🎤 语音识别 (置信度: ${(msg.confidence * 100).toFixed(1)}%)`);
                break;
            case 'tts_done':
                addLog('ai', msg.text);
                break;
            case 'camera_frame_ack':
                frameCount++;
                break;
            case 'request_frame':
                captureAndSendFrame();
                break;
            case 'error':
                addLog('error', `服务端错误: ${msg.message}`);
                break;
            default:
                console.log('未知消息:', msg);
        }
    }

    // ===== 音频播放 (raw PCM → AudioContext) =====
    function handleAudioData(blob) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const arrayBuffer = e.target.result;
                const pcmInt16 = new Int16Array(arrayBuffer);
                const float32Data = new Float32Array(pcmInt16.length);
                for (let i = 0; i < pcmInt16.length; i++) {
                    float32Data[i] = pcmInt16[i] / 32768;
                }
                const audioCtx = new AudioContext({ sampleRate: 24000 });
                const audioBuffer = audioCtx.createBuffer(1, float32Data.length, 24000);
                audioBuffer.getChannelData(0).set(float32Data);
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);
                source.onended = () => audioCtx.close();
                source.start();
            } catch (err) {
                console.warn('播放音频失败:', err);
            }
        };
        reader.onerror = () => console.warn('读取音频数据失败');
        reader.readAsArrayBuffer(blob);
        addLog('system', '🔊 收到 AI 语音回复');
    }

    // ===== 摄像头 =====
    async function toggleCamera() {
        if (cameraActive) { stopCamera(); return; }
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480, frameRate: 10 }
            });
            document.getElementById('localVideo').srcObject = localStream;
            cameraActive = true;
            document.querySelector('#statusBadge').textContent = '📷 摄像头: 已开启';
            document.querySelector('#statusBadge').className = 'badge active';
            addLog('system', '📷 摄像头已开启');
            startFrameCapture();
        } catch (err) {
            addLog('error', `摄像头访问失败: ${err.message}`);
        }
    }

    function stopCamera() {
        if (frameInterval) { clearInterval(frameInterval); frameInterval = null; }
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        cameraActive = false;
        document.querySelector('#statusBadge').textContent = '📷 摄像头: 未开启';
        document.querySelector('#statusBadge').className = 'badge';
        addLog('system', '📷 摄像头已关闭');
    }

    function startFrameCapture() {
        if (frameInterval) clearInterval(frameInterval);
        lastFpsTime = Date.now();
        frameCount = 0;
        frameInterval = setInterval(() => {
            captureAndSendFrame();
            const now = Date.now();
            if (now - lastFpsTime >= 1000) {
                fpsBadge.textContent = `📸 帧率: ${frameCount} fps`;
                frameCount = 0;
                lastFpsTime = now;
            }
        }, 200);
    }

    function captureAndSendFrame() {
        const video = document.getElementById('localVideo');
        if (!video || !video.videoWidth) return;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const base64 = canvas.toDataURL('image/jpeg', 0.5);
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                type: 'camera_frame',
                imageData: base64,
                format: 'jpeg',
                width: canvas.width,
                height: canvas.height,
                timestamp: Date.now()
            }));
        }
    }

    // ===== 麦克风 + ASR (raw PCM) =====
    async function toggleMic() {
        if (micActive) { stopMic(); return; }
        try {
            micStream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: true, noiseSuppression: true }
            });
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'start_asr' }));
            }
            audioContext = new AudioContext({ sampleRate: 16000 });
            const source = audioContext.createMediaStreamSource(micStream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);
            processor.onaudioprocess = (e) => {
                const input = e.inputBuffer.getChannelData(0);
                const pcmData = new Int16Array(input.length);
                for (let i = 0; i < input.length; i++) {
                    const s = Math.max(-1, Math.min(1, input[i]));
                    pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(pcmData.buffer);
                }
            };
            source.connect(processor);
            processor.connect(audioContext.destination);
            scriptProcessor = processor;
            micActive = true;
            micBadge.textContent = '🎤 麦克风: 已开启 (raw PCM)';
            micBadge.className = 'badge active';
            btnMic.textContent = '关闭麦克风';
            btnMic.className = 'btn-danger';
            addLog('system', '🎤 麦克风已开启，语音识别已启动 (raw PCM)');
        } catch (err) {
            addLog('error', `麦克风访问失败: ${err.message}`);
        }
    }

    function stopMic() {
        if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
        if (audioContext) { audioContext.close().catch(() => {}); audioContext = null; }
        if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
        micActive = false;
        micBadge.textContent = '🎤 麦克风: 未开启';
        micBadge.className = 'badge';
        btnMic.textContent = '打开麦克风';
        btnMic.className = 'btn-secondary';
        addLog('system', '🎤 麦克风已关闭');
    }

    // ===== UI 工具 =====
    function updateStatus(state, text) {
        const el = document.getElementById('statusText');
        el.textContent = text;
        el.className = `status-${state}`;
    }

    function addLog(type, text) {
        const container = document.getElementById('logContainer');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        const time = new Date().toLocaleTimeString();
        entry.innerHTML = `<span class="log-time">${time}</span>${text}`;
        container.appendChild(entry);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
