<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 视频通话</title>
    <!-- 内联 favicon，避免浏览器请求 /favicon.ico 产生 404 -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%23D97757'/%3E%3C/svg%3E">

    <!-- Tailwind CSS 3 (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>

    <!-- Live2D 运行库：Cubism Core -> PIXI v6 -> pixi-live2d-display（顺序不可变） -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        claude: {
                            bg: '#F8D9B0',        // 页面杏色底
                            surface: '#FFFFFF',
                            panel: '#F4F2EA',     // 暖色面板
                            border: '#E7E3D7',
                            ink: '#2B2A27',       // 主文字
                            muted: '#76746C',     // 次文字
                            primary: '#D97757',   // 陶土橙（主色）
                            primaryDark: '#BE5E3E',
                            primarySoft: '#F5DDCE',
                            amber: '#E8943B',     // 橙黄高亮
                            stage: '#211F1B',     // 视频深色舞台
                            stageSoft: '#2C2A25',
                        }
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        /* 自定义滚动条，贴合暖色风格 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #DDD7C8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #C9C2AF; }

        /* 字幕条：自下而上滑动条式，新句顶旧句，旧句渐隐 */
        #subtitleStage {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
        }
        .subtitle-line {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
            will-change: opacity, transform;
            flex-shrink: 0;
        }
        .subtitle-line.is-in {
            opacity: 1;
            transform: translateY(0);
        }
        .subtitle-line.is-old {
            opacity: 0.55;
            transform: translateY(-8px);
            transition: opacity 1.5s ease-in, transform 1.5s ease-in;
        }
        .subtitle-line.is-out {
            opacity: 0;
            transform: translateY(-16px);
            transition: opacity 0.8s ease-in, transform 0.8s ease-in;
        }

        /* AI 占位形象的呼吸光环 */
        @keyframes claudePulse {
            0%, 100% { transform: scale(1); opacity: .55; }
            50% { transform: scale(1.12); opacity: .25; }
        }
        .ai-pulse { animation: claudePulse 2.8s ease-in-out infinite; }
    </style>
</head>

<body class="bg-claude-bg text-claude-ink font-sans h-screen overflow-hidden antialiased">

<!-- ===== 浮动 AI 小人（可拖动 / 可缩放，桌宠式） ===== -->
<div id="live2dWidget" class="group fixed z-30 select-none cursor-move" style="left:24px; bottom:24px; width:300px; height:440px;">
    <div class="relative w-full h-full">
        <!-- 透明画布：只渲染小人本体（抠图效果） -->
        <canvas id="live2dCanvas" class="absolute inset-0 w-full h-full"></canvas>

        <!-- 拖动提示（悬停才显示，平时干净） -->
        <div id="live2dDrag" class="absolute top-1 left-1 h-6 flex items-center opacity-0 group-hover:opacity-100 transition pointer-events-none">
            <span class="text-[10px] font-medium text-claude-ink/70 flex items-center gap-1 px-1.5 py-0.5 rounded-md bg-white/65 backdrop-blur shadow-sm">
                <span class="w-1.5 h-1.5 rounded-full bg-claude-primary"></span> 拖动移动
            </span>
        </div>

        <!-- 加载中 / 失败占位 -->
        <div id="aiPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center gap-3 pointer-events-none">
            <div class="relative w-20 h-20 flex items-center justify-center">
                <span class="ai-pulse absolute inset-0 rounded-full bg-claude-primary"></span>
                <span class="relative w-16 h-16 rounded-full bg-gradient-to-br from-claude-amber to-claude-primary flex items-center justify-center text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="16" height="12" x="4" y="8" rx="3"/><path d="M12 8V4"/><circle cx="12" cy="3" r="1"/><path d="M9 13h.01M15 13h.01M9.5 17h5"/>
                    </svg>
                </span>
            </div>
            <p id="aiPlaceholderText" class="text-claude-ink/60 text-xs">形象加载中…</p>
        </div>

        <!-- 右下角缩放手柄（平时半透明，悬停更明显） -->
        <div id="live2dResize" class="absolute bottom-0 right-0 w-6 h-6 cursor-se-resize flex items-center justify-center rounded-tl-lg bg-white/45 backdrop-blur text-claude-ink/70 opacity-40 group-hover:opacity-100 transition shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v6h-6M9 3H3v6M21 3l-7 7M3 21l7-7"/>
            </svg>
        </div>
    </div>
</div>

<script>
    // ===== 全局状态 =====
    let ws = null;
    let sessionId = null;
    let localStream = null;
    let frameInterval = null;
    let frameCount = 0;
    let lastFpsTime = Date.now();
    let cameraActive = false;
    let audioContext = null;
    let scriptProcessor = null;
    let micStream = null;
    let micActive = false;
    let currentConvId = null;
    let conversations = [];

    // Axios 实例，统一指向后端 /api/chat
    const api = axios.create({ baseURL: '/api/chat' });

    // 常用 DOM 句柄
    const $ = (id) => document.getElementById(id);

    // ===== Live2D AI 小人 =====
    const LIVE2D_MODEL = 'live2d/haru/haru_greeter_t03.model3.json'; // 换模型只改这里
    let live2dApp = null;
    let live2dModel = null;
    let mouthOpen = 0;            // 当前口型开合 0~1
    let live2dAspect = 0;         // 模型宽高比(宽/高)，让浮框贴合人物、去掉空白边
    // 共享音频播放 + 分析（用于唇形同步）
    let playbackCtx = null;
    let analyser = null;
    let analyserBuf = null;
    let activeAudioSources = 0;

    async function initLive2D() {
        const canvas = $('live2dCanvas');
        // 运行库未就绪（离线/被拦截）则保留占位
        if (!canvas || !window.PIXI || !window.PIXI.live2d) {
            setPlaceholderText('形象库未加载，已用占位');
            return;
        }
        try {
            live2dApp = new PIXI.Application({
                view: canvas,
                resizeTo: $('live2dWidget'),
                backgroundAlpha: 0,        // 透明背景（抠图效果）
                useContextAlpha: true,
                antialias: true,
                autoDensity: true,
                resolution: window.devicePixelRatio || 1,
            });

            // 手动接管更新顺序，保证唇形覆盖在动作之后生效
            live2dModel = await PIXI.live2d.Live2DModel.from(LIVE2D_MODEL, {
                autoInteract: false,
                autoUpdate: false,
            });
            live2dApp.stage.addChild(live2dModel);
            $('aiPlaceholder').classList.add('hidden');

            // 记录模型宽高比，并把浮框调整为同比例 -> 人物铺满、框贴合人物
            const im0 = live2dModel.internalModel;
            const mw0 = (im0 && im0.originalWidth) || live2dModel.width || 1;
            const mh0 = (im0 && im0.originalHeight) || live2dModel.height || 1;
            live2dAspect = mw0 / mh0;
            applyWidgetAspect();   // 内部会 resize + fitLive2D

            // 唇形同步：劫持 motionManager.update，在“动作已应用、最终定型前”写入嘴型，
            // 否则嘴型会被每帧动作/coreModel.update 覆盖，导致嘴不动。
            installLipSync(live2dModel);

            // 每帧推进模型（含眨眼/呼吸/待机动作；嘴型由上面的劫持负责）
            live2dApp.ticker.add(function () {
                if (live2dModel) live2dModel.update(live2dApp.ticker.deltaMS);
            });

            window.addEventListener('resize', fitLive2D);
        } catch (err) {
            console.warn('Live2D 加载失败:', err);
            setPlaceholderText('形象加载失败，已用占位');
        }
    }

    // 安装唇形同步：在动作更新之后、模型定型之前覆盖嘴部参数
    function installLipSync(model) {
        const coreModel = model.internalModel.coreModel;
        try {
            const mm = model.internalModel.motionManager;
            const orig = mm.update.bind(mm);
            mm.update = function () {
                const r = orig.apply(this, arguments);   // 先让动作正常应用
                updateMouth();
                try { coreModel.setParameterValueById('ParamMouthOpenY', mouthOpen); } catch (e) {}
                return r;
            };
        } catch (e) {
            console.warn('唇形同步劫持失败，回退逐帧覆盖:', e);
            live2dApp.ticker.add(function () {
                if (!live2dModel) return;
                updateMouth();
                try { coreModel.setParameterValueById('ParamMouthOpenY', mouthOpen); } catch (e2) {}
            });
        }
    }

    // 按模型宽高比调整浮框高度，使框贴合人物（以当前宽度为基准）
    function applyWidgetAspect() {
        if (!live2dAspect) return;
        const widget = $('live2dWidget');
        const w = widget.offsetWidth;
        let h = Math.round(w / live2dAspect);
        const maxH = window.innerHeight - 16;
        if (h > maxH) { h = maxH; widget.style.width = Math.round(h * live2dAspect) + 'px'; }
        widget.style.height = h + 'px';
        if (live2dApp) { live2dApp.resize(); fitLive2D(); }
    }

    function fitLive2D() {
        if (!live2dModel || !live2dApp) return;
        const res = live2dApp.renderer.resolution || 1;
        const w = live2dApp.renderer.width / res;
        const h = live2dApp.renderer.height / res;
        // 用模型“原始画布尺寸”算缩放，保证整只小人完整可见（含脸）
        const im = live2dModel.internalModel;
        const mw = (im && im.originalWidth) || live2dModel.width || 1;
        const mh = (im && im.originalHeight) || live2dModel.height || 1;
        const scale = Math.min(w / mw, h / mh);   // contain：全身可见
        live2dModel.scale.set(scale);
        live2dModel.anchor.set(0.5, 0.5);
        live2dModel.position.set(w / 2, h / 2);
    }

    function setPlaceholderText(t) {
        const el = $('aiPlaceholderText');
        if (el) el.textContent = t;
    }

    // 根据正在播放的 TTS 音量驱动口型
    function updateMouth() {
        if (analyser && activeAudioSources > 0) {
            analyser.getByteTimeDomainData(analyserBuf);
            let sum = 0;
            for (let i = 0; i < analyserBuf.length; i++) {
                const v = (analyserBuf[i] - 128) / 128;
                sum += v * v;
            }
            const rms = Math.sqrt(sum / analyserBuf.length);
            const target = Math.min(1, rms * 5.5);      // 放大到可见幅度
            // 张口快、闭口稍慢，动作更自然也更明显
            const k = target > mouthOpen ? 0.6 : 0.35;
            mouthOpen = mouthOpen + (target - mouthOpen) * k;
        } else {
            mouthOpen *= 0.6;                           // 无声时渐渐闭嘴
            if (mouthOpen < 0.01) mouthOpen = 0;
        }
    }

    function ensurePlaybackAudio() {
        if (!playbackCtx) {
            playbackCtx = new AudioContext({ sampleRate: 24000 });
            analyser = playbackCtx.createAnalyser();
            analyser.fftSize = 512;
            analyser.smoothingTimeConstant = 0.6;
            analyserBuf = new Uint8Array(analyser.fftSize);
            analyser.connect(playbackCtx.destination);
        }
        if (playbackCtx.state === 'suspended') playbackCtx.resume();
    }

    // 浮动小人：拖动 + 缩放
    function initLive2DWidget() {
        const widget = $('live2dWidget');
        const resizeHandle = $('live2dResize');
        if (!widget) return;
        const pt = (e) => ({ x: e.clientX, y: e.clientY });

        // ---- 拖动（整窗可拖，缩放手柄除外）----
        let dragging = false, dx = 0, dy = 0;
        widget.addEventListener('pointerdown', function (e) {
            if (e.target.closest('#live2dResize')) return;
            dragging = true;
            const r = widget.getBoundingClientRect();
            widget.style.left = r.left + 'px';
            widget.style.top = r.top + 'px';
            widget.style.right = 'auto';
            widget.style.bottom = 'auto';
            const p = pt(e); dx = p.x - r.left; dy = p.y - r.top;
            e.preventDefault();
            window.addEventListener('pointermove', onDragMove);
            window.addEventListener('pointerup', onDragEnd);
        });
        function onDragMove(e) {
            if (!dragging) return;
            const p = pt(e);
            const w = widget.offsetWidth, h = widget.offsetHeight;
            const nx = Math.max(0, Math.min(window.innerWidth - w, p.x - dx));
            const ny = Math.max(0, Math.min(window.innerHeight - h, p.y - dy));
            widget.style.left = nx + 'px';
            widget.style.top = ny + 'px';
        }
        function onDragEnd() {
            dragging = false;
            window.removeEventListener('pointermove', onDragMove);
            window.removeEventListener('pointerup', onDragEnd);
        }

        // ---- 缩放（右下角手柄）----
        let resizing = false, sx = 0, sy = 0, sw = 0, sh = 0;
        resizeHandle.addEventListener('pointerdown', function (e) {
            resizing = true;
            const p = pt(e); sx = p.x; sy = p.y;
            sw = widget.offsetWidth; sh = widget.offsetHeight;
            e.preventDefault(); e.stopPropagation();
            window.addEventListener('pointermove', onResizeMove);
            window.addEventListener('pointerup', onResizeEnd);
        });
        function onResizeMove(e) {
            if (!resizing) return;
            const p = pt(e);
            const maxW = window.innerWidth - 16;
            const maxH = window.innerHeight - 16;
            let nw = Math.max(160, Math.min(maxW, sw + (p.x - sx)));
            let nh;
            if (live2dAspect) {
                // 锁定模型宽高比：框始终贴合人物，不产生空白边
                nh = nw / live2dAspect;
                if (nh > maxH) { nh = maxH; nw = nh * live2dAspect; }
            } else {
                nh = Math.max(200, Math.min(maxH, sh + (p.y - sy)));
            }
            widget.style.width = nw + 'px';
            widget.style.height = nh + 'px';
            if (live2dApp) { live2dApp.resize(); fitLive2D(); }
        }
        function onResizeEnd() {
            resizing = false;
            window.removeEventListener('pointermove', onResizeMove);
            window.removeEventListener('pointerup', onResizeEnd);
        }
    }

    // ===== 抽屉（聊天记录卡片） =====
    function toggleDrawer(open) {
        const drawer = $('historyDrawer');
        const backdrop = $('drawerBackdrop');
        if (open) {
            drawer.classList.remove('translate-x-full');
            backdrop.classList.remove('opacity-0', 'pointer-events-none');
        } else {
            drawer.classList.add('translate-x-full');
            backdrop.classList.add('opacity-0', 'pointer-events-none');
        }
    }

    // ===== 字幕条：自下而上滑动条式，新句顶旧句，旧句渐隐 =====
    let subtitleTimer = null;
    let subtitleLines = [];    // 当前可见字幕行
    function showSubtitle(role, text) {
        if (!text) return;
        const stage = $('subtitleStage');

        // 把上一条标记为旧（变淡、微上移）
        if (subtitleLines.length > 0) {
            const prev = subtitleLines[subtitleLines.length - 1];
            prev.classList.remove('is-in');
            prev.classList.add('is-old');
        }

        // 创建新字幕行
        const line = document.createElement('div');
        const isUser = role === 'user';
        line.className = 'subtitle-line flex items-center justify-center text-center px-4 py-1';
        line.innerHTML =
            '<span class="' + (isUser
                ? 'text-claude-ink/90'
                : 'text-claude-primary') +
            ' text-2xl sm:text-3xl md:text-4xl font-semibold leading-snug max-w-full">' +
            '<span class="text-sm align-middle mr-2.5 px-2 py-0.5 rounded ' +
                (isUser ? 'bg-claude-panel text-claude-muted' : 'bg-claude-primarySoft text-claude-primaryDark') +
            '">' + (isUser ? '我' : 'AI') + '</span>' +
            escapeHtml(text) +
            '</span>';
        stage.appendChild(line);

        // 触发入场动画（从下滑入）
        requestAnimationFrame(() => {
            requestAnimationFrame(() => line.classList.add('is-in'));
        });

        subtitleLines.push(line);

        // 最多保留 3 条可见字幕，超出的渐进移除
        while (subtitleLines.length > 3) {
            expireLine(subtitleLines.shift());
        }

        // 定时：N 秒后本条开始老化
        const hold = Math.min(5000, Math.max(2000, text.length * 120));
        if (subtitleTimer) clearTimeout(subtitleTimer);
        subtitleTimer = setTimeout(() => {
            if (subtitleLines.length > 1) {
                expireLine(subtitleLines.shift());
            }
        }, hold);
    }

    function expireLine(line) {
        if (!line || line.classList.contains('is-out')) return;
        const rect = line.getBoundingClientRect();
        line.classList.remove('is-in', 'is-old');
        line.classList.add('is-out');
        // 脱离正常流，避免移除时其他字幕跳动
        line.style.position = 'absolute';
        line.style.left = rect.left + 'px';
        line.style.top = rect.top + 'px';
        line.style.width = rect.width + 'px';
        setTimeout(() => line.remove(), 800);
    }

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ===== 对话管理 =====
    async function loadConversations() {
        try {
            const { data: res } = await api.get('/conversations', { params: { userId: 'default' } });
            if (res.code === '0000') {
                conversations = res.data || [];
                renderConvList();
            }
        } catch (e) {
            console.warn('加载对话列表失败:', e);
        }
    }

    // 首次加载后，自动选中最近一条对话（让历史可见、连接一次到位）
    async function initConversations() {
        await loadConversations();
        if (!currentConvId && conversations.length > 0) {
            await selectConversation(conversations[0].id);
        }
    }

    function renderConvList() {
        const list = $('convList');
        list.innerHTML = '';
        if (conversations.length === 0) {
            list.innerHTML = '<p class="px-2 py-3 text-xs text-claude-muted">暂无对话，点击"新对话"开始</p>';
            return;
        }
        conversations.forEach(function (c) {
            const active = c.id === currentConvId;
            const div = document.createElement('div');
            div.className = 'group flex items-center justify-between gap-2 px-2.5 py-2 rounded-lg cursor-pointer text-[13px] transition-colors ' +
                (active ? 'bg-claude-primarySoft text-claude-primaryDark font-medium' : 'hover:bg-claude-panel');
            div.innerHTML =
                '<span class="truncate flex-1">' + escapeHtml(c.title || '对话') + '</span>' +
                '<button class="opacity-0 group-hover:opacity-100 text-claude-muted hover:text-[#C2553F] transition" ' +
                'onclick="event.stopPropagation();deleteConversation(' + c.id + ')" title="删除">' +
                '<svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>' +
                '</button>';
            div.onclick = function () { selectConversation(c.id); };
            list.appendChild(div);
        });
    }

    async function newConversation() {
        try {
            const { data: res } = await api.post('/conversations', null, { params: { userId: 'default' } });
            if (res.code === '0000') {
                await loadConversations();
                selectConversation(res.data.id);
            }
        } catch (e) {
            console.warn('创建对话失败:', e);
        }
    }

    async function selectConversation(id) {
        currentConvId = id;
        renderConvList();
        try {
            const { data: res } = await api.get('/conversations/' + id + '/messages');
            if (res.code === '0000') {
                const container = $('logContainer');
                container.innerHTML = '';
                (res.data || []).forEach(function (m) {
                    addLog(m.role === 'user' ? 'user' : 'ai', m.content, m.createdAt);
                });
            }
        } catch (e) {
            console.warn('加载消息失败:', e);
        }
    }

    async function deleteConversation(id) {
        if (!confirm('确定删除此对话吗？')) return;
        try {
            await api.delete('/conversations/' + id);
            if (currentConvId === id) {
                currentConvId = null;
                $('logContainer').innerHTML = '';
            }
            await loadConversations();
        } catch (e) {
            console.warn('删除对话失败:', e);
        }
    }

    // ===== WebSocket 会话管理 =====
    async function connect() {
        try {
            $('btnConnect').disabled = true;
            updateStatus('connecting', '连接中…');

            // 没有选中对话时，先自动新建一个，再继续连接（不再中断）
            if (!currentConvId) {
                await newConversation();
                if (!currentConvId) {
                    addLog('error', '创建对话失败，请重试');
                    updateStatus('error', '连接错误');
                    $('btnConnect').disabled = false;
                    return;
                }
            }

            const { data: result } = await api.post('/session', { userId: 'default' });
            if (result.code !== '0000') {
                addLog('error', '创建会话失败: ' + result.info);
                updateStatus('error', '连接错误');
                $('btnConnect').disabled = false;
                return;
            }
            sessionId = result.data.sessionId;
            addLog('system', '创建会话: ' + sessionId);

            ws = new WebSocket('ws://' + location.host + '/ws?sessionId=' + sessionId + '&conversationId=' + currentConvId);

            ws.onopen = function () {
                updateStatus('connected', '已连接');
                $('wsBadge').textContent = 'WebSocket: 已连接';
                $('btnConnect').disabled = true;
                $('btnDisconnect').disabled = false;
                $('btnCamera').disabled = false;
                $('btnMic').disabled = false;
                addLog('system', 'WebSocket 已连接');
            };

            ws.onmessage = function (event) {
                if (event.data instanceof Blob) {
                    handleAudioData(event.data);
                    return;
                }
                try {
                    handleMessage(JSON.parse(event.data));
                } catch (e) {
                    console.warn('非JSON消息:', event.data);
                }
            };

            ws.onclose = function () {
                updateStatus('disconnected', '未连接');
                $('wsBadge').textContent = 'WebSocket: 未连接';
                $('btnConnect').disabled = false;
                $('btnConnect').textContent = '连接';
                $('btnDisconnect').disabled = true;
                $('btnCamera').disabled = true;
                $('btnMic').disabled = true;
                if (sessionId) addLog('system', '连接已关闭');
                ws = null;
            };

            ws.onerror = function () {
                addLog('error', 'WebSocket 连接错误');
                updateStatus('error', '连接错误');
            };

        } catch (err) {
            addLog('error', '创建会话失败: ' + err.message);
            $('btnConnect').disabled = false;
        }
    }

    function disconnect() {
        if (ws) { ws.close(); ws = null; }
        stopCamera();
        stopMic();
    }

    function handleMessage(msg) {
        switch (msg.type) {
            case 'connected':
                addLog('system', 'WebSocket 连接确认');
                setTimeout(function () { toggleCamera(); }, 500);
                setTimeout(function () { toggleMic(); }, 1000);
                break;
            case 'asr_result':
                addLog('user', msg.text);
                showSubtitle('user', msg.text);   // 用户每说一句 -> 字幕浮现后渐隐
                break;
            case 'tts_done':
                addLog('ai', msg.text);
                showSubtitle('ai', msg.text);      // AI 回答 -> 字幕浮现后渐隐
                break;
            case 'camera_frame_ack':
                frameCount++;
                break;
            case 'request_frame':
                captureAndSendFrame();
                break;
            case 'error':
                addLog('error', '服务端错误: ' + msg.message);
                break;
            default:
                console.log('未知消息:', msg);
        }
    }

    function handleAudioData(blob) {
        const reader = new FileReader();
        reader.onload = function (e) {
            try {
                ensurePlaybackAudio();
                const pcmInt16 = new Int16Array(e.target.result);
                const float32Data = new Float32Array(pcmInt16.length);
                for (let i = 0; i < pcmInt16.length; i++) {
                    float32Data[i] = pcmInt16[i] / 32768;
                }
                const audioBuffer = playbackCtx.createBuffer(1, float32Data.length, 24000);
                audioBuffer.getChannelData(0).set(float32Data);
                const source = playbackCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(analyser);              // 经分析节点 -> 扬声器，供唇形同步采样
                activeAudioSources++;
                source.onended = function () {
                    activeAudioSources = Math.max(0, activeAudioSources - 1);
                };
                source.start();
            } catch (err) {
                console.warn('播放音频失败:', err);
            }
        };
        reader.onerror = function () { console.warn('读取音频数据失败'); };
        reader.readAsArrayBuffer(blob);
        addLog('system', '收到 AI 语音回复');
    }

    // ===== 摄像头 =====
    async function toggleCamera() {
        if (cameraActive) { stopCamera(); return; }
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480, frameRate: 10 }
            });
            $('localVideo').srcObject = localStream;
            $('localPlaceholder').classList.add('hidden');
            cameraActive = true;
            setChip($('statusBadge'), '摄像头: 已开启', true);
            addLog('system', '摄像头已开启');
            startFrameCapture();
        } catch (err) {
            addLog('error', '摄像头访问失败: ' + err.message);
        }
    }

    function stopCamera() {
        if (frameInterval) { clearInterval(frameInterval); frameInterval = null; }
        if (localStream) {
            localStream.getTracks().forEach(function (t) { t.stop(); });
            localStream = null;
        }
        cameraActive = false;
        $('localPlaceholder').classList.remove('hidden');
        setChip($('statusBadge'), '摄像头: 未开启', false);
        addLog('system', '摄像头已关闭');
    }

    function startFrameCapture() {
        if (frameInterval) clearInterval(frameInterval);
        lastFpsTime = Date.now();
        frameCount = 0;
        frameInterval = setInterval(function () {
            captureAndSendFrame();
            const now = Date.now();
            if (now - lastFpsTime >= 1000) {
                $('fpsBadge').textContent = '帧率: ' + frameCount + ' fps';
                frameCount = 0;
                lastFpsTime = now;
            }
        }, 200);
    }

    function captureAndSendFrame() {
        const video = $('localVideo');
        if (!video || !video.videoWidth) return;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const base64 = canvas.toDataURL('image/jpeg', 0.5);
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                type: 'camera_frame',
                imageData: base64,
                format: 'jpeg',
                width: canvas.width,
                height: canvas.height,
                timestamp: Date.now()
            }));
        }
    }

    // ===== 麦克风 =====
    async function toggleMic() {
        if (micActive) { stopMic(); return; }
        try {
            micStream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: true, noiseSuppression: true }
            });
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'start_asr' }));
            }
            audioContext = new AudioContext({ sampleRate: 16000 });
            const source = audioContext.createMediaStreamSource(micStream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);
            processor.onaudioprocess = function (e) {
                const input = e.inputBuffer.getChannelData(0);
                const pcmData = new Int16Array(input.length);
                for (let i = 0; i < input.length; i++) {
                    const s = Math.max(-1, Math.min(1, input[i]));
                    pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(pcmData.buffer);
                }
            };
            source.connect(processor);
            processor.connect(audioContext.destination);
            scriptProcessor = processor;
            micActive = true;
            setChip($('micBadge'), '麦克风: 已开启', true);
            $('btnMic').textContent = '关闭麦克风';
            addLog('system', '麦克风已开启');
        } catch (err) {
            addLog('error', '麦克风访问失败: ' + err.message);
        }
    }

    function stopMic() {
        if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
        if (audioContext) { audioContext.close().catch(function () {}); audioContext = null; }
        if (micStream) { micStream.getTracks().forEach(function (t) { t.stop(); }); micStream = null; }
        micActive = false;
        setChip($('micBadge'), '麦克风: 未开启', false);
        $('btnMic').textContent = '麦克风';
        addLog('system', '麦克风已关闭');
    }

    // ===== 状态 & 日志 =====
    function updateStatus(state, text) {
        const el = $('statusText');
        el.textContent = text;
        const map = {
            connected: 'bg-[#E8F3E8] text-[#3C7A47]',
            connecting: 'bg-claude-primarySoft text-claude-primaryDark',
            disconnected: 'bg-claude-panel text-claude-muted',
            error: 'bg-claude-primarySoft text-claude-primaryDark'
        };
        el.className = 'text-xs px-2.5 py-1 rounded-full ' + (map[state] || map.disconnected);
    }

    // chip 高亮（开启=橙色，关闭=灰）
    function setChip(el, text, on) {
        el.textContent = text;
        el.className = 'px-2.5 py-1 rounded-full ' +
            (on ? 'bg-claude-primarySoft text-claude-primaryDark font-medium' : 'bg-claude-panel text-claude-muted');
    }

    // 抽屉内消息日志
    function addLog(type, text, ts) {
        const container = $('logContainer');
        const entry = document.createElement('div');
        const time = ts ? new Date(ts).toLocaleTimeString() : new Date().toLocaleTimeString();

        if (type === 'user' || type === 'ai') {
            const isUser = type === 'user';
            entry.className = 'flex ' + (isUser ? 'justify-end' : 'justify-start');
            entry.innerHTML =
                '<div class="max-w-[80%]">' +
                    '<div class="px-3 py-2 rounded-2xl text-[13px] leading-relaxed ' +
                        (isUser
                            ? 'bg-gradient-to-br from-claude-amber to-claude-primary text-white rounded-br-sm'
                            : 'bg-claude-panel text-claude-ink rounded-bl-sm') +
                    '">' + escapeHtml(text) + '</div>' +
                    '<div class="text-[10px] text-claude-muted mt-1 ' + (isUser ? 'text-right' : 'text-left') + '">' + time + '</div>' +
                '</div>';
        } else {
            const color = type === 'error' ? 'text-[#C2553F]' : 'text-claude-muted';
            entry.className = 'text-center';
            entry.innerHTML = '<span class="text-[11px] ' + color + ' italic">' + escapeHtml(text) + '</span>';
        }
        container.appendChild(entry);
        container.scrollTop = container.scrollHeight;
    }

    // 页面加载 -> 拉对话列表并自动选中最近一条
    initConversations();
    // 初始化浮动 AI 小人（拖动/缩放）并加载模型
    initLive2DWidget();
    initLive2D();
</script>
